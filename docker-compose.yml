services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mpm_app
    restart: unless-stopped
    volumes:
      - .:/var/www
    networks:
      - mpm_network
    depends_on:
      - db
      - redis

  web:
    image: nginx:alpine
    container_name: mpm_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - mpm_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: mpm_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: mini_project_management
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mpm_db_data:/var/lib/mysql
    networks:
      - mpm_network

  redis:
    image: redis:alpine
    container_name: mpm_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - mpm_network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mpm_queue
    restart: unless-stopped
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    volumes:
      - .:/var/www
    networks:
      - mpm_network
    depends_on:
      - app
      - redis

networks:
  mpm_network:
    driver: bridge

volumes:
  mpm_db_data:
    driver: local
